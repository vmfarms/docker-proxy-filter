services:
  proxy-container:
    image: proxycontainer
    build:
      dockerfile: docker/Dockerfile
      context: .
    env_file: .env
  dockerproxy:
    image: wollomatic/socket-proxy:1.10.0
    restart: unless-stopped
    user: 0:0
    mem_limit: 64M
    read_only: true
    ports:
      - 2379:2375
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    command:
      # - '-loglevel=info'

      - '-loglevel=debug'
      - '-allowGET=.*'
      - '-allowHEAD=.*'
      - '-allowPOST=.*'
      - '-allowPUT=.*'
      - '-allowPATCH=.*'
      - '-allowDELETE=.*'
      - '-allowCONNECT=.*'
      - '-allowTRACE=.*'
      - '-allowOPTIONS=.*'

      - '-listenip=0.0.0.0'
      - '-allowfrom=0.0.0.0/0'

      #- '-allowGET=/_ping|v1\..{1,2}/(info|containers/json|events)'
      #- '-allowGET=/v1\..{1,2}/(version|containers/.*|events.*)'
      - '-allowbindmountfrom=/var/log,/tmp' # restrict bind mounts to specific directories
      - '-watchdoginterval=3600' # check once per hour for socket availability
      - '-stoponwatchdog' # halt program on error and let compose restart it
      - '-shutdowngracetime=5' # wait 5 seconds before shutting down
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro